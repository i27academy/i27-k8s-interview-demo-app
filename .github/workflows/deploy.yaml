name: Deploy to OpenShift

on:
  push:
    branches:
    - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install oc CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: latest

    - name: Login to OpenShift
      run: |
        oc login \
          --server=${{ secrets.OC_SERVER }} \
          --token=${{ secrets.OC_TOKEN }} \
          --insecure-skip-tls-verify=true

    - name: Verify Connection
      run: |
        oc whoami
        oc project ${{ secrets.OC_NAMESPACE }}
        oc get pods -n ${{ secrets.OC_NAMESPACE }}

    - name: Trigger S2I Build
      run: |
        oc start-build i27academy-demo-app \
          --follow \
          --wait \
          -n ${{ secrets.OC_NAMESPACE }}

    - name: Verify Build
      run: |
        oc get builds -n ${{ secrets.OC_NAMESPACE }} | tail -3
        oc get imagestream i27academy-demo-app \
          -n ${{ secrets.OC_NAMESPACE }}

    - name: Deploy
      run: |
        oc rollout restart deployment/i27academy-demo-app \
          -n ${{ secrets.OC_NAMESPACE }}

        oc rollout status deployment/i27academy-demo-app \
          -n ${{ secrets.OC_NAMESPACE }} \
          --timeout=120s

    - name: Verify Deployment
      run: |
        oc get pods -n ${{ secrets.OC_NAMESPACE }}
        oc get route -n ${{ secrets.OC_NAMESPACE }}
        echo "Deployment successful! App is live on OpenShift."